# Target markets configuration
# Each entry defines a market to track and its resolution metadata

markets:
  - id: "will-fed-cut-rates-march-2025"
    description: "Will the Fed cut rates at the March 2025 FOMC meeting?"
    keywords:
      - "Federal Reserve"
      - "FOMC"
      - "interest rates"
      - "rate cut"
      - "Powell"
    resolution_source: "federalreserve.gov"
    resolution_criteria: "Resolves YES if the FOMC announces a rate cut at their March 2025 meeting"
    category: "economics"

  - id: "will-ukraine-ceasefire-2025"
    description: "Will there be a ceasefire agreement in Ukraine in 2025?"
    keywords:
      - "Ukraine"
      - "ceasefire"
      - "Russia"
      - "peace talks"
      - "NATO"
    resolution_source: "Reuters"
    resolution_criteria: "Resolves YES if a formal ceasefire agreement is signed and acknowledged by both sides before Dec 31 2025"
    category: "geopolitics"

  - id: "sp500-above-6000-end-2025"
    description: "Will the S&P 500 close above 6000 at end of 2025?"
    keywords:
      - "S&P 500"
      - "stock market"
      - "SPX"
      - "equities"
      - "recession"
    resolution_source: "Bloomberg"
    resolution_criteria: "Resolves YES if S&P 500 closing price on Dec 31, 2025 is above 6000"
    category: "finance"

# Default signal weights for Bayesian fusion
# These calibrate how much each signal type shifts the posterior
signal_weights:
  news_gdelt: 1.2
  news_rss: 1.1
  cross_market_kalshi: 1.4
  cross_market_metaculus: 1.3
  cross_market_manifold: 1.1
  microstructure_vpin: 1.5
  llm_decomposition: 1.3
  reddit_social: 0.9
  wikipedia_velocity: 1.0

# VPIN thresholds
vpin:
  informed_trading_threshold: 0.4
  high_activity_threshold: 0.6
  n_buckets: 50

# Cross-market arbitrage
cross_market:
  min_divergence: 0.05
  strong_signal_divergence: 0.10
  fee_adjusted_threshold: 0.02
