services:
  # Full autonomous agent + live web dashboard
  agent:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    command: python scripts/run_agent.py
    restart: unless-stopped

  # Standalone dashboard with demo data — no API keys needed
  dashboard:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    command: python scripts/run_dashboard.py
    profiles: ["dashboard"]

  # Canned judge demo
  demo:
    build: .
    env_file: .env
    volumes:
      - .:/app
    command: python scripts/demo_event.py
    profiles: ["demo"]
